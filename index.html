<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pushpsaar Perfumes</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#0d0d0d;
      color:white;
      overflow-x:hidden;
    }

    header{
      width:100%;
      height:90vh;
      background:
      linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.8)),
      url('ChatGPT Image May 22, 2026, 08_20_51 PM.png');
      background-size:cover;
      background-position:center;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      text-align:center;
      padding:20px;
    }

    header h1{
      font-size:70px;
      letter-spacing:6px;
      color:#f5f5f5;
    }

    header p{
      margin-top:20px;
      color:#b8b8b8;
      font-size:18px;
      max-width:700px;
      line-height:1.7;
    }

    .shop-btn{
      margin-top:30px;
      padding:14px 40px;
      background:#1f1f1f;
      border:1px solid #555;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .shop-btn:hover{
      background:#fff;
      color:#000;
    }

    .products{
      padding:80px 8%;
    }

    .section-title{
      text-align:center;
      font-size:42px;
      margin-bottom:60px;
      letter-spacing:4px;
      color:#e6e6e6;
    }

    .product-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:35px;
    }

    .card{
      background:#141414;
      border:1px solid #2b2b2b;
      border-radius:18px;
      overflow:hidden;
      transition:0.4s;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    .card:hover{
      transform:translateY(-8px);
      box-shadow:0 0 30px rgba(255,255,255,0.08);
    }

    .card img{
      width:100%;
      height:360px;
      object-fit:cover;
    }

    .card-content{
      padding:22px;
    }

    .card-content h2{
      font-size:24px;
      margin-bottom:10px;
    }

    .price{
      color:#bdbdbd;
      margin-bottom:18px;
      font-size:18px;
    }

    .btns{
      display:flex;
      gap:12px;
    }

    .add-btn,
    .buy-btn{
      flex:1;
      padding:12px;
      border:none;
      cursor:pointer;
      font-weight:bold;
      transition:0.3s;
    }

    .add-btn{
      background:#2a2a2a;
      color:white;
    }

    .add-btn:hover{
      background:#444;
    }

    .buy-btn{
      background:#fff;
      color:#000;
    }

    .buy-btn:hover{
      background:#bdbdbd;
    }

    .cart-section{
      background:#111;
      padding:60px 8%;
      border-top:1px solid #2a2a2a;
    }

    .cart-title{
      font-size:36px;
      margin-bottom:30px;
      text-align:center;
    }

    #cart-items{
      margin-top:20px;
    }

    .cart-item{
      display:flex;
      justify-content:space-between;
      background:#1a1a1a;
      padding:18px;
      margin-bottom:14px;
      border-radius:12px;
      border:1px solid #2e2e2e;
    }

    .checkout-btn{
      margin-top:30px;
      width:100%;
      padding:16px;
      background:#25D366;
      color:white;
      border:none;
      font-size:18px;
      cursor:pointer;
      border-radius:10px;
      font-weight:bold;
    }

    .checkout-btn:hover{
      opacity:0.9;
    }

    footer{
      padding:40px;
      text-align:center;
      color:#888;
      background:#0a0a0a;
      border-top:1px solid #222;
    }

    @media(max-width:768px){

      header h1{
        font-size:42px;
      }

      .section-title{
        font-size:30px;
      }

      .card img{
        height:300px;
      }
    }

  </style>
</head>

<body>

<header>

  <h1>PUSHPSAAR</h1>

  <p>
    Luxury masculine fragrances crafted for confidence,
    elegance and presence.
  </p>

  <button class="shop-btn" onclick="scrollToProducts()">
    SHOP NOW
  </button>

</header>


<section class="products" id="products">

  <h2 class="section-title">
    OUR COLLECTION
  </h2>

  <div class="product-grid">

    <div class="card">
      <img src="ChatGPT Image May 22, 2026, 08_12_27 PM.png" alt="">
      <div class="card-content">
        <h2>Creed Aventus</h2>
        <p class="price">₹899</p>

        <div class="btns">
          <button class="add-btn"
          onclick="addToCart('Creed Aventus',899)">
          Add to Cart
          </button>

          <button class="buy-btn"
          onclick="buyNow('Creed Aventus',899)">
          Buy Now
          </button>
        </div>
      </div>
    </div>


    <div class="card">
      <img src="ChatGPT Image May 22, 2026, 08_11_56 PM.png" alt="">
      <div class="card-content">
        <h2>Armani Code</h2>
        <p class="price">₹849</p>

        <div class="btns">
          <button class="add-btn"
          onclick="addToCart('Armani Code',849)">
          Add to Cart
          </button>

          <button class="buy-btn"
          onclick="buyNow('Armani Code',849)">
          Buy Now
          </button>
        </div>
      </div>
    </div>


    <div class="card">
      <img src="ChatGPT Image May 22, 2026, 08_11_11 PM.png" alt="">
      <div class="card-content">
        <h2>Dior Sauvage</h2>
        <p class="price">₹999</p>

        <div class="btns">
          <button class="add-btn"
          onclick="addToCart('Dior Sauvage',999)">
          Add to Cart
          </button>

          <button class="buy-btn"
          onclick="buyNow('Dior Sauvage',999)">
          Buy Now
          </button>
        </div>
      </div>
    </div>


    <div class="card">
      <img src="ChatGPT Image May 22, 2026, 08_11_00 PM.png" alt="">
      <div class="card-content">
        <h2>Bleu De Chanel</h2>
        <p class="price">₹949</p>

        <div class="btns">
          <button class="add-btn"
          onclick="addToCart('Bleu De Chanel',949)">
          Add to Cart
          </button>

          <button class="buy-btn"
          onclick="buyNow('Bleu De Chanel',949)">
          Buy Now
          </button>
        </div>
      </div>
    </div>


    <div class="card">
      <img src="ChatGPT Image May 22, 2026, 08_10_46 PM.png" alt="">
      <div class="card-content">
        <h2>Gucci Guilty</h2>
        <p class="price">₹899</p>

        <div class="btns">
          <button class="add-btn"
          onclick="addToCart('Gucci Guilty',899)">
          Add to Cart
          </button>

          <button class="buy-btn"
          onclick="buyNow('Gucci Guilty',899)">
          Buy Now
          </button>
        </div>
      </div>
    </div>


    <div class="card">
      <img src="ChatGPT Image May 22, 2026, 08_11_24 PM.png" alt="">
      <div class="card-content">
        <h2>SRK Combo</h2>
        <p class="price">₹1499</p>

        <div class="btns">
          <button class="add-btn"
          onclick="addToCart('SRK Combo',1499)">
          Add to Cart
          </button>

          <button class="buy-btn"
          onclick="buyNow('SRK Combo',1499)">
          Buy Now
          </button>
        </div>
      </div>
    </div>

  </div>

</section>


<section class="cart-section">

  <h2 class="cart-title">
    YOUR CART
  </h2>

  <div id="cart-items"></div>

  <button class="checkout-btn" onclick="checkoutWhatsapp()">
    ORDER ON WHATSAPP
  </button>

</section>


<footer>
  © 2026 Pushpsaar Perfumes • Luxury Masculine Fragrances
</footer>


<script>

  let cart = [];

  function scrollToProducts(){
    document.getElementById('products')
    .scrollIntoView({behavior:'smooth'});
  }

  function addToCart(name,price){

    cart.push({name,price});

    renderCart();

  }

  function renderCart(){

    let cartContainer =
    document.getElementById('cart-items');

    cartContainer.innerHTML = "";

    let total = 0;

    cart.forEach((item,index)=>{

      total += item.price;

      cartContainer.innerHTML += `

      <div class="cart-item">

        <div>
          <strong>${item.name}</strong>
        </div>

        <div>
          ₹${item.price}
        </div>

      </div>

      `;

    });

    if(cart.length > 0){

      cartContainer.innerHTML += `

      <div class="cart-item">

        <strong>Total</strong>

        <strong>₹${total}</strong>

      </div>

      `;

    }

  }


  function checkoutWhatsapp(){

    if(cart.length === 0){

      alert("Your cart is empty");

      return;

    }

    let message =
    "Hello Pushpsaar Perfumes,%0A%0AI want to order:%0A";

    let total = 0;

    cart.forEach((item)=>{

      message +=
      "- " + item.name +
      " ₹" + item.price + "%0A";

      total += item.price;

    });

    message += "%0A Total: ₹" + total;

    window.open(
      "https://wa.me/916386235558?text=" + message,
      "_blank"
    );

  }


  function buyNow(name,price){

    let message =
    "Hello Pushpsaar Perfumes,%0A%0AI want to order:%0A" +
    name +
    " ₹" +
    price;

    window.open(
      "https://wa.me/916386235558?text=" + message,
      "_blank"
    );

  }

</script>

</body>
</html>
